[build]
  command = "npm ci && node scripts/prebuild-netlify.js && cd backend && npx prisma generate && cd .. && npm run build -w backend && npm run build -w frontend"
  publish = "frontend/dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
