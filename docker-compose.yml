version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: mikconnect
      POSTGRES_USER: mikconnect
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mikconnect']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mikconnect:${DB_PASSWORD:-changeme}@postgres:5432/mikconnect
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 3001
      FRONTEND_URL: https://mikconnect.com
    ports:
      - '3001:3001'

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend

volumes:
  postgres_data:
